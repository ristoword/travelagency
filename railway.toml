# ⚠️  Non usare questo file per il backend: crea un servizio con
# Root Directory = apps/backend (legge apps/backend/railway.toml).
# Frontend: Root Directory vuota, Dockerfile = apps/frontend-admin/Dockerfile

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/frontend-admin/Dockerfile"
buildCommand = ""

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
