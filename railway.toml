# Servizio BACKEND (default). Per il frontend admin usa Dockerfile:
# apps/frontend-admin/Dockerfile e apps/frontend-admin/railway.toml nel nuovo servizio.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/backend/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
